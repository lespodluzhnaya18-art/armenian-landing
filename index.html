<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇦🇲 Армянский Язык | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNLjDLmtW01ux7Rz87phpqVruNYKjl1mg",
            authDomain: "armenianway.firebaseapp.com",
            projectId: "armenianway",
            storageBucket: "armenianway.firebasestorage.app",
            messagingSenderId: "192632103042",
            appId: "1:192632103042:web:e328a5acb20d521e4d149b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Глобальные функции для доступа из HTML
        window.handleLogin = async () => {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            const btn = document.getElementById('login-btn');
            if(!email || !pass) return showToast("Введите почту и пароль");
            
            btn.innerText = 'Вход...';
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                showToast("Ошибка: Проверьте данные или создайте юзера в Firebase");
                btn.innerText = 'Войти в систему';
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-info').innerText = `Профиль: ${user.email}`;
                loadData();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        window.saveWord = async () => {
            const arm = document.getElementById('add-arm').value.trim();
            const trans = document.getElementById('add-trans').value.trim();
            const rus = document.getElementById('add-rus').value.trim();
            if(!arm || !rus) return showToast("Заполните поля!");

            const btn = document.getElementById('save-btn');
            btn.innerText = 'Сохранение...';
            
            try {
                await addDoc(collection(db, "words"), {
                    arm, trans, rus,
                    cat: document.getElementById('add-cat').value,
                    createdAt: serverTimestamp()
                });
                showToast("✓ Добавлено в облако!");
                document.getElementById('add-arm').value = '';
                document.getElementById('add-trans').value = '';
                document.getElementById('add-rus').value = '';
                loadData();
            } catch (e) { showToast("Ошибка сохранения"); }
            btn.innerText = 'Добавить в словарь';
        };

        async function loadData() {
            const q = query(collection(db, "words"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            window.wordsData = snap.docs.map(doc => doc.data());
            renderTest();
        }

        window.loadAlphabet = async () => {
            const snap = await getDocs(collection(db, "alphabet"));
            const grid = document.getElementById('alphabet-grid');
            const data = snap.docs.map(doc => doc.data());
            if(data.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; color:#888;'>Алфавит пуст. Добавьте буквы в Firestore.</p>";
                return;
            }
            grid.innerHTML = data.map(b => `<div class="grid-item"><div class="grid-letter">${b.letter}</div><div style="font-size:11px; color:#888;">${b.name}</div></div>`).join('');
        };

        window.db = db;
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root { --red: #E8341C; --red-soft: #fff1ee; --dark: #1a1a1a; --border: #e8e8e8; --bg: #f7f5f2; --radius: 32px; --radius-sm: 18px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; padding: 45px 30px; border-radius: var(--radius); width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center; }
        
        #main-app { display: none; width: 100%; max-width: 500px; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; padding: 60px 0 40px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 48px; line-height: 1; margin-bottom: 12px; }
        .hero h1 span { color: var(--red); }

        .card { background: #fff; border-radius: var(--radius); box-shadow: 0 15px 45px rgba(0,0,0,0.05); overflow: hidden; position: relative; }
        .tabs { display: flex; background: #fafafa; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .tab { flex: 1; min-width: 90px; padding: 25px 5px; font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; color: #888; border-bottom: 4px solid transparent; text-transform: uppercase; }
        .tab.active { color: var(--red); border-bottom-color: var(--red); background: #fff; }

        .panel { display: none; padding: 40px 25px; }
        .panel.active { display: block; }
        
        .test-word { font-family: 'Playfair Display', serif; font-size: 56px; text-align: center; margin: 45px 0; letter-spacing: -1px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 18px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; outline: none; }
        
        .btn { width: 100%; padding: 20px; border-radius: var(--radius-sm); border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--red); color: #fff; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: #555; margin-top: 15px; }

        .floating-settings { position: fixed; bottom: 30px; left: 30px; width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.1); cursor: pointer; transition: 0.5s; }
        .floating-settings:hover { transform: rotate(180deg); }

        .dict-item { padding: 18px 0; border-bottom: 1px solid #f8f8f8; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .grid-item { background: #fff; border: 1px solid var(--border); padding: 25px 10px; border-radius: var(--radius-sm); text-align: center; }
        .grid-letter { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--red); }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 18px 40px; border-radius: 50px; font-size: 14px; display: none; z-index: 10000; text-align: center; width: 90%; max-width: 420px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="font-family:'Playfair Display';">Барев, Джан! 🇦🇲</h2>
        <p style="font-size:15px; color:#888; margin-bottom:30px;">Используйте почту из Firebase</p>
        <div class="input-group"><label>Email</label><input type="email" id="auth-email" placeholder="example@mail.com"></div>
        <div class="input-group"><label>Пароль</label><input type="password" id="auth-pass" placeholder="••••"></div>
        <button id="login-btn" class="btn btn-primary" onclick="handleLogin()">Войти в систему</button>
    </div>
</div>

<div id="main-app">
    <div class="hero">
        <h1>Армянский <span>Язык</span></h1>
        <p>Интерактивная платформа на Firebase</p>
    </div>

    <div class="card">
        <div class="tabs">
            <div class="tab active" data-tab="test">🎯 Тесты</div>
            <div class="tab" data-tab="add">➕ Слова</div>
            <div class="tab" data-tab="words">📚 Словарь</div>
            <div class="tab" data-tab="alphabet">📖 Алфавит</div>
        </div>

        <div class="panel active" id="panel-test">
            <div id="test-word" class="test-word">...</div>
            <input type="text" id="answer-input" placeholder="Перевод..." autocomplete="off">
            <button class="btn btn-primary" style="margin-top:25px" onclick="checkAnswer()">Проверить ✓</button>
        </div>

        <div class="panel" id="panel-add">
            <div class="input-group"><label>Слово</label><input type="text" id="add-arm"></div>
            <div class="input-group"><label>Транскрипция</label><input type="text" id="add-trans"></div>
            <div class="input-group"><label>Перевод</label><input type="text" id="add-rus"></div>
            <div class="input-group"><label>Категория</label><select id="add-cat"><option>Урок 1</option><option>Семья</option></select></div>
            <button class="btn btn-primary" id="save-btn" onclick="saveWord()">Добавить в облако</button>
        </div>

        <div class="panel" id="panel-words"><div id="words-content">Загрузка...</div></div>
        <div class="panel" id="panel-alphabet"><div class="grid" id="alphabet-grid"></div></div>

        <div class="panel" id="panel-settings">
            <div id="user-info" style="font-size:14px; color:#888; margin-bottom:20px;"></div>
            <button class="btn btn-outline" style="color:var(--red)" onclick="logout()">Выйти из системы</button>
        </div>
    </div>
</div>

<div class="floating-settings" onclick="openSettings()">⚙️</div>
<div id="toast" class="toast"></div>

<script>
    window.wordsData = [];
    window.currentWord = null;

    function renderTest() {
        if(!window.wordsData.length) return document.getElementById('test-word').innerText = "Пусто";
        window.currentWord = window.wordsData[Math.floor(Math.random() * window.wordsData.length)];
        document.getElementById('test-word').innerText = window.currentWord.arm;
        document.getElementById('answer-input').value = '';
    }

    function checkAnswer() {
        const val = document.getElementById('answer-input').value.trim().toLowerCase();
        if(val === window.currentWord.rus.toLowerCase()) {
            showToast("✨ Правильно!"); setTimeout(renderTest, 1000);
        } else { showToast("❌ Ошибка: " + window.currentWord.rus); }
    }

    function openSettings() {
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        document.getElementById('panel-settings').classList.add('active');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            const tab = t.dataset.tab;
            document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
            t.classList.add('active'); document.getElementById('panel-' + tab).classList.add('active');
            if(tab === 'alphabet') window.loadAlphabet();
            if(tab === 'words') {
                const cont = document.getElementById('words-content');
                cont.innerHTML = window.wordsData.map(w => `<div class="dict-item"><div><b>${w.arm}</b><br><small>${w.trans || ''}</small></div> <span>${w.rus}</span></div>`).join('');
            }
        });
    });
</script>
</body>
</html>
