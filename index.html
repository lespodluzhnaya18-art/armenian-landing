<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇦🇲 Армянский язык</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
        --red: #E8341C;
        --red-soft: #fff1ee;
        --dark: #1a1a1a;
        --mid: #555;
        --light: #888;
        --border: #e8e8e8;
        --bg: #f7f5f2;
        --card: #ffffff;
        --radius: 28px;
        --radius-sm: 16px;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 16px 60px;
    }

    /* === HEADER (как ты любишь) === */
    .hero {
        text-align: center;
        padding: 50px 0 35px;
        max-width: 500px;
        width: 100%;
    }
    .hero-flag { font-size: 50px; margin-bottom: 8px; }
    .hero h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(34px, 8vw, 44px);
        letter-spacing: -1px;
        color: var(--dark);
        margin: 0;
        line-height: 1.1;
    }
    .hero h1 span { color: var(--red); }
    .hero p {
        margin-top: 10px;
        font-size: 15px;
        color: var(--light);
        font-weight: 300;
        letter-spacing: 0.5px;
    }

    /* === CARD === */
    .card {
        background: var(--card);
        border-radius: var(--radius);
        width: 100%;
        max-width: 480px;
        box-shadow: 0 15px 50px rgba(0,0,0,0.06);
        overflow: hidden;
    }

    /* === TABS (Крупнее и читабельнее) === */
    .tabs {
        display: flex;
        background: #fafafa;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        scrollbar-width: none;
        padding: 0 8px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
        flex: 1;
        min-width: 85px;
        padding: 18px 5px;
        font-size: 13px; /* Сделали крупнее */
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        color: var(--light);
        transition: 0.2s;
        border-bottom: 2px solid transparent;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        user-select: none;
    }
    .tab-icon { font-size: 20px; display: block; margin-bottom: 4px; } /* Иконки больше */
    .tab.active { color: var(--red); border-bottom-color: var(--red); background: #fff; }

    /* === PANELS === */
    .panel { display: none; padding: 30px; }
    .panel.active { display: block; }
    .section-title { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--light); margin-bottom: 25px; }

    /* === TEST AREA === */
    .test-box {
        background: linear-gradient(135deg, #fff5f4 0%, #fff 100%);
        border: 1px solid #ffd5d0;
        border-radius: var(--radius-sm);
        padding: 50px 20px;
        text-align: center;
        margin-bottom: 25px;
    }
    .test-armenian { font-family: 'Playfair Display', serif; font-size: 52px; color: var(--dark); line-height: 1.1; }
    
    .test-mode-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
    .mode-btn { font-size: 11px; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--light); font-weight: 600; text-transform: uppercase; }
    .mode-btn.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 2px 5px rgba(232,52,28,0.2); }

    /* === INPUTS & FORMS === */
    .input-group { margin-bottom: 18px; text-align: left; }
    .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--light); margin-bottom: 8px; text-transform: uppercase; }
    input, select {
        width: 100%;
        padding: 15px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
        background: #fff;
    }
    input:focus { border-color: var(--red); box-shadow: 0 0 0 4px rgba(232,52,28,0.06); }

    /* === BUTTONS === */
    .btn {
        width: 100%;
        padding: 16px;
        border-radius: var(--radius-sm);
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        font-size: 16px;
        font-family: 'DM Sans', sans-serif;
    }
    .btn-primary { background: var(--red); color: #fff; box-shadow: 0 4px 12px rgba(232,52,28,0.1); }
    .btn-primary:hover { opacity: 0.95; transform: translateY(-1px); }
    .btn-secondary { background: #f0f0f0; color: var(--mid); margin-top: 10px; }

    /* Круглая кнопка Плюс в Настройках */
    .btn-plus {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 46px; height: 46px;
        border-radius: 50%;
        background: var(--red);
        color: #fff;
        border: none;
        font-size: 24px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 3px 8px rgba(232,52,28,0.2);
    }
    .btn-plus:hover { transform: scale(1.05); background: #c92d14; }

    /* === LISTS (Словарь и Префиксы) === */
    .dict-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f5f5f5; }
    .dict-item:last-child { border-bottom: none; }
    .dict-arm { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark); }
    .dict-rus { font-size: 14px; color: var(--mid); text-align: right; line-height: 1.4; }
    .cat-title { font-size: 11px; font-weight: 800; color: var(--red); margin: 25px 0 12px; text-transform: uppercase; border-bottom: 1px solid var(--red-soft); padding-bottom: 6px; }

    /* === ALPHABET GRID === */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
    .grid-item { background: #fff; border: 1px solid var(--border); padding: 20px 8px; border-radius: var(--radius-sm); text-align: center; transition: all 0.2s; }
    .grid-item:hover { border-color: var(--red); background: var(--red-soft); }
    .grid-letter { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--red); }
    .grid-info { font-size: 11px; color: var(--light); margin-top: 6px; line-height: 1.3; }

    /* === TOAST === */
    .toast {
        position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
        background: var(--dark); color: #fff; padding: 14px 30px; border-radius: 30px;
        font-size: 14px; display: none; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<div class="hero">
    <h1>Армянский <span>Язык</span></h1>
    <p>Твой интерактивный самоучитель Степаняна</p>
</div>

<div class="card">
    <div class="tabs">
        <div class="tab active" data-tab="test"><span class="tab-icon">🎯</span>Тесты</div>
        <div class="tab" data-tab="add"><span class="tab-icon">➕</span>Слово</div>
        <div class="tab" data-tab="words"><span class="tab-icon">📚</span>Слова</div>
        <div class="tab" data-tab="alphabet"><span class="tab-icon">📖</span>Алфавит</div>
        <div class="tab" data-tab="prefixes"><span class="tab-icon">🔗</span>Префиксы</div>
        <div class="tab" data-tab="settings"><span class="tab-icon">⚙️</span></div>
    </div>

    <div class="panel active" id="panel-test">
        <div class="test-mode-toggle">
            <button class="mode-btn active" id="mode-rus" onclick="setMode('translation')">Перевод</button>
            <button class="mode-btn" id="mode-arm" onclick="setMode('pronunciation')">Звук</button>
        </div>
        <div class="test-box">
            <div id="test-word" class="test-armenian">...</div>
        </div>
        <div class="input-group">
            <input type="text" id="answer-input" placeholder="Перевод на русском..." autocomplete="off">
        </div>
        <button class="btn btn-primary" onclick="checkAnswer()">Проверить ✓</button>
    </div>

    <div class="panel" id="panel-add">
        <div class="section-title">Новая карточка слова</div>
        <div class="input-group">
            <label>Слово (армянский)</label>
            <input type="text" id="add-arm" placeholder="Напр: Բարև">
        </div>
        <div class="input-group">
            <label>Транскрипция (звук)</label>
            <input type="text" id="add-trans" placeholder="Напр: Barev">
        </div>
        <div class="input-group">
            <label>Перевод (русский)</label>
            <input type="text" id="add-rus" placeholder="Напр: Привет">
        </div>
        <div class="input-group">
            <label>Добавить в список</label>
            <select id="add-cat"></select>
        </div>
        <button class="btn btn-primary" id="save-btn" onclick="saveWord()">Сохранить в Google</button>
    </div>

    <div class="panel" id="panel-words">
        <div class="section-title">Весь твой словарь</div>
        <div id="words-content">Загрузка данных...</div>
    </div>

    <div class="panel" id="panel-alphabet">
        <div class="section-title">Армянский Алфавит</div>
        <div class="grid" id="alphabet-grid"></div>
    </div>

    <div class="panel" id="panel-prefixes">
        <div class="section-title">Части слов и Префиксы</div>
        <div id="prefixes-content">Загрузка префиксов...</div>
    </div>

    <div class="panel" id="panel-settings">
        <div class="section-title">Настройки Синхронизации</div>
        <div class="input-group">
            <label>Script URL (Ключ доступа)</label>
            <input type="text" id="url-input" placeholder="https://script.google.com/...">
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Применить ключ</button>
        
        <div class="section-title" style="margin-top: 35px; margin-bottom: 20px;">Мои списки слов</div>
        <div class="input-group" style="margin-bottom:0;">
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="text" id="new-cat-input" placeholder="Новая категория..." style="flex:1;">
                <button class="btn-plus" onclick="addCategory()">+</button>
            </div>
        </div>
        <div id="cat-chips" style="margin-top:10px;"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- КОНФИГУРАЦИЯ ---
let SCRIPT_URL = localStorage.getItem('arm_exec_url') || 'ВСТАВЬ_СВОЙ_EXEC_URL';
let categories = JSON.parse(localStorage.getItem('arm_cats')) || ['Урок 1', 'Семья'];
let wordsData = [];
let testMode = 'translation';
let currentWord = null;

async function init() {
    document.getElementById('url-input').value = SCRIPT_URL;
    renderCategories();
    await syncData('Слова');
    renderTest();
}

async function syncData(sheetName) {
    try {
        const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheetName)}`);
        const data = await res.json();
        if (sheetName === 'Слова') wordsData = data;
        return data;
    } catch(e) { console.error('Ошибка синхронизации:', sheetName); return []; }
}

function renderTest() {
    if(!wordsData.length) return document.getElementById('test-word').innerText = 'Нет слов';
    currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
    document.getElementById('test-word').innerText = currentWord.Армянский;
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').focus();
}

function setMode(mode) {
    testMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(mode === 'translation' ? 'mode-rus' : 'mode-arm').classList.add('active');
    renderTest();
}

function checkAnswer() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = (testMode === 'translation' ? currentWord.Русский : currentWord.Транскрипция).toLowerCase();
    if(input === correct) { showToast('✨ Правильно, джан!'); setTimeout(renderTest, 1200); }
    else { showToast(`❌ Ошибка: ${correct}`); }
}

async function saveWord() {
    const data = {
        targetSheet: 'Слова',
        category: document.getElementById('add-cat').value,
        word: document.getElementById('add-arm').value.trim(),
        transcription: document.getElementById('add-trans').value.trim(),
        translation: document.getElementById('add-rus').value.trim()
    };
    if(!data.word || !data.translation) return showToast('⚠️ Заполни армянский и русский!');

    const btn = document.getElementById('save-btn');
    btn.innerText = 'Синхронизация...';
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    showToast('✓ Слово сохранено!');
    btn.innerText = 'Сохранить в Google';
    await syncData('Слова');
}

async function renderAlphabet() {
    const data = await syncData('Алфавит');
    const grid = document.getElementById('alphabet-grid');
    grid.innerHTML = data.map(b => `
        <div class="grid-item">
            <div class="grid-letter">${b.Буква}</div>
            <div class="grid-info">${b.Название} [${b.Звук}] <br><small>${b.Пример || ''}</small></div>
        </div>
    `).join('');
}

async function renderPrefixes() {
    const data = await syncData('Префиксы');
    const cont = document.getElementById('prefixes-content');
    cont.innerHTML = data.map(p => `
        <div class="dict-item">
            <div class="dict-arm"><b>${p.Префикс}</b></div>
            <div class="dict-rus">${p.Значение}</div>
        </div>
    `).join('');
}

function renderWords() {
    const cont = document.getElementById('words-content');
    if(!wordsData.length) return cont.innerText = 'Твой словарь пуст';
    const grouped = {};
    wordsData.forEach(w => { if(!grouped[w.Категория]) grouped[w.Категория] = []; grouped[w.Категория].push(w); });
    cont.innerHTML = Object.entries(grouped).map(([cat, ws]) => `
        <div class="cat-title">${cat}</div>
        ${ws.map(w => `<div class="dict-item"><div class="dict-arm">${w.Армянский}</div><div class="dict-rus">${w.Русский} <br><small>${w.Транскрипция}</small></div></div>`).join('')}
    `).join('');
}

function renderCategories() {
    document.getElementById('add-cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
}

function addCategory() {
    const val = document.getElementById('new-cat-input').value.trim();
    if(val && !categories.includes(val)) { categories.push(val); localStorage.setItem('arm_cats', JSON.stringify(categories)); renderCategories(); document.getElementById('new-cat-input').value = ''; showToast('✓ Список добавлен'); }
}

function showToast(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}

function saveSettings() {
    localStorage.setItem('arm_exec_url', document.getElementById('url-input').value.trim());
    location.reload();
}

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', async () => {
        const tab = t.dataset.tab;
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        t.classList.add('active'); document.getElementById('panel-' + tab).classList.add('active');
        if(tab === 'alphabet') renderAlphabet();
        if(tab === 'words') renderWords();
        if(tab === 'prefixes') renderPrefixes();
    });
});

init();
</script>
</body>
</html>
