<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇦🇲 Армянский язык</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E8341C;
    --red-soft: #fff1ee;
    --dark: #1a1a1a;
    --mid: #555;
    --light: #888;
    --border: #e8e8e8;
    --bg: #f7f5f2;
    --card: #ffffff;
    --radius: 20px;
    --radius-sm: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 40px 0 28px;
    max-width: 450px;
    width: 100%;
  }
  .hero-flag { font-size: 40px; margin-bottom: 12px; }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 7vw, 38px);
    letter-spacing: -0.5px;
    color: var(--dark);
  }
  .hero h1 span { color: var(--red); }
  .hero p {
    margin-top: 8px;
    font-size: 14px;
    color: var(--light);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    width: 100%;
    max-width: 450px;
    overflow: hidden;
    box-shadow: 0 4px 40px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 4px;
    overflow-x: auto;
    scrollbar-width: none;
    background: #fafafa;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 60px;
    padding: 14px 6px;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    color: var(--light);
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    user-select: none;
  }
  .tab .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }
  .tab:hover:not(.active) { color: var(--dark); }

  /* PANELS */
  .panel { display: none; padding: 28px 24px; }
  .panel.active { display: block; }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 20px;
  }

  /* TEST PANEL */
  .test-word-container {
    background: linear-gradient(135deg, #fff5f4 0%, #fff 100%);
    border: 1px solid #ffd5d0;
    border-radius: var(--radius-sm);
    padding: 32px 20px;
    text-align: center;
    margin-bottom: 20px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .test-word-container::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: var(--red);
    opacity: 0.04;
    border-radius: 50%;
  }
  .test-armenian {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    color: var(--dark);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .test-category-badge {
    font-size: 10px;
    background: var(--red-soft);
    color: var(--red);
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .test-empty {
    font-size: 14px;
    color: var(--light);
    font-style: italic;
  }

  /* INPUTS */
  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fff;
    appearance: none;
  }
  input:focus, select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(232,52,28,0.08); }
  .input-group { margin-bottom: 12px; }
  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 6px;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 13px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    text-decoration: none;
    width: 100%;
  }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-primary:hover { background: #c92d14; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(232,52,28,0.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: transparent;
    color: var(--dark);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: #f5f5f5; }
  .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; }

  /* FEEDBACK */
  .feedback {
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 14px;
    display: none;
  }
  .feedback.correct { background: #ecfdf5; color: #059669; display: block; }
  .feedback.wrong { background: #fef2f2; color: #dc2626; display: block; }

  /* DICTIONARY */
  .dict-category {
    margin-bottom: 20px;
  }
  .dict-category-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--red);
    padding-bottom: 8px;
    border-bottom: 1px solid #ffd5d0;
    margin-bottom: 10px;
  }
  .dict-word {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f3f3f3;
    font-size: 14px;
  }
  .dict-word:last-child { border-bottom: none; }
  .dict-armenian { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--dark); }
  .dict-russian { color: var(--mid); font-size: 13px; }
  .dict-empty { text-align: center; color: var(--light); font-size: 14px; padding: 30px 0; font-style: italic; }

  /* BLOCKS */
  .blocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
  }
  .block-item {
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
    transition: all 0.2s;
    cursor: default;
  }
  .block-item:hover { border-color: var(--red); background: var(--red-soft); }
  .block-letter { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--dark); }
  .block-name { font-size: 10px; color: var(--light); margin-top: 2px; }
  .block-sound { font-size: 11px; color: var(--mid); font-weight: 500; }
  .block-example { font-size: 9px; color: var(--light); margin-top: 2px; }

  /* SETTINGS */
  .categories-list { margin-bottom: 16px; }
  .cat-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red-soft);
    color: var(--red);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    margin: 4px;
  }
  .cat-chip.default { background: #f0f0f0; color: var(--mid); }
  .cat-remove {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    opacity: 0.6;
  }
  .cat-remove:hover { opacity: 1; }

  /* STATUS */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--light);
    margin-bottom: 16px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ccc;
  }
  .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .status-dot.ok { background: #10b981; }
  .status-dot.err { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: #fff;
    border-radius: var(--radius-sm);
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid rgba(232,52,28,0.2);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .flex-row { display: flex; gap: 10px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .text-muted { color: var(--light); font-size: 12px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-flag">🇦🇲</div>
  <h1>Armenian <span>Way</span></h1>
  <p>Системный прогресс по Дарию Степаняну</p>
</div>

<div class="card">
  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="test"><span class="tab-icon">🎯</span>Тест</div>
    <div class="tab" data-tab="add"><span class="tab-icon">➕</span>Слово</div>
    <div class="tab" data-tab="dict"><span class="tab-icon">📚</span>Словарь</div>
    <div class="tab" data-tab="blocks"><span class="tab-icon">📖</span>Алфавит</div>
    <div class="tab" data-tab="settings"><span class="tab-icon">⚙️</span>Настройки</div>
  </div>

  <!-- TEST PANEL -->
  <div class="panel active" id="panel-test">
    <div class="status-bar">
      <div class="status-dot" id="test-status-dot"></div>
      <span id="test-status-text">Загрузка слов...</span>
    </div>
    <div class="test-word-container">
      <div id="test-content">
        <div class="spinner"></div>
      </div>
    </div>
    <div class="feedback" id="test-feedback"></div>
    <div class="input-group">
      <label>Ваш перевод</label>
      <input type="text" id="test-input" placeholder="Введите перевод на русском" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="btn-check">Проверить ✓</button>
    <button class="btn btn-secondary mt-8" id="btn-skip">Пропустить →</button>
  </div>

  <!-- ADD WORD PANEL -->
  <div class="panel" id="panel-add">
    <div class="section-title">Новое слово</div>
    <div class="input-group">
      <label>Армянское слово</label>
      <input type="text" id="add-word" placeholder="Например: Բարև">
    </div>
    <div class="input-group">
      <label>Транскрипция</label>
      <input type="text" id="add-article" placeholder="Например: Barev">
    </div>
    <div class="input-group">
      <label>Перевод (русский)</label>
      <input type="text" id="add-translation" placeholder="Например: Привет">
    </div>
    <div class="input-group">
      <label>Категория</label>
      <select id="add-category"></select>
    </div>
    <button class="btn btn-primary mt-16" id="btn-save">
      <span id="save-label">Сохранить слово</span>
    </button>
  </div>

  <!-- DICTIONARY PANEL -->
  <div class="panel" id="panel-dict">
    <div class="status-bar">
      <div class="status-dot" id="dict-status-dot"></div>
      <span id="dict-status-text">Обновление...</span>
    </div>
    <div id="dict-content"><div style="text-align:center;padding:30px"><div class="spinner"></div></div></div>
  </div>

  <!-- BLOCKS PANEL -->
  <div class="panel" id="panel-blocks">
    <div class="section-title">Армянский алфавит</div>
    <div id="blocks-content"><div style="text-align:center;padding:30px"><div class="spinner"></div></div></div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="panel" id="panel-settings">
    <div class="section-title">Мои категории</div>
    <div id="categories-display" class="categories-list"></div>
    <div class="input-group">
      <label>Новая категория</label>
      <input type="text" id="new-category-input" placeholder="Название категории">
    </div>
    <button class="btn btn-primary mt-8" id="btn-add-category">Добавить категорию</button>

    <div class="section-title mt-16" style="margin-top:28px;">Данные</div>
    <div class="input-group">
      <label>Google Sheets — Слова (CSV)</label>
      <input type="text" id="url-words" placeholder="URL Google Sheets CSV">
    </div>
    <div class="input-group">
      <label>Google Sheets — Блоки (CSV)</label>
      <input type="text" id="url-blocks" placeholder="URL Google Sheets CSV">
    </div>
    <div class="input-group">
      <label>Google Apps Script (POST)</label>
      <input type="text" id="url-script" placeholder="URL Apps Script">
    </div>
    <button class="btn btn-primary mt-8" id="btn-save-urls">Сохранить URLs</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG — можно менять здесь или через вкладку Настройки
// ============================================================
const DEFAULT_URL_WORDS_READ = 'https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=0';
const DEFAULT_URL_BLOCKS     = 'https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=1';
const DEFAULT_URL_APPS_SCRIPT = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';

const DEFAULT_CATEGORIES = ['Урок 1', 'Местоимения'];

// ============================================================
// STATE
// ============================================================
let words = [];       // [{category, armenian, russian}]
let blocks = [];      // [{letter, name, sound, example}]
let userCategories = JSON.parse(localStorage.getItem('arm_categories') || '[]');
let currentWord = null;
let urlWords  = localStorage.getItem('arm_url_words')  || DEFAULT_URL_WORDS_READ;
let urlBlocks = localStorage.getItem('arm_url_blocks') || DEFAULT_URL_BLOCKS;
let urlScript = localStorage.getItem('arm_url_script') || DEFAULT_URL_APPS_SCRIPT;

// ============================================================
// UTILS
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  return lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    return cols;
  }).filter(r => r.some(c => c));
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function setStatus(dotId, textId, state, text) {
  const dot = document.getElementById(dotId);
  const txt = document.getElementById(textId);
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function allCategories() {
  return [...DEFAULT_CATEGORIES, ...userCategories];
}

// ============================================================
// FETCH WORDS
// ============================================================
async function fetchWords() {
  setStatus('test-status-dot','test-status-text','loading','Загрузка слов...');
  setStatus('dict-status-dot','dict-status-text','loading','Обновление...');
  try {
    const resp = await fetch(urlWords + '&t=' + Date.now());
    const text = await resp.text();
    const rows = parseCSV(text);
    words = rows.map(r => ({ category: r[0]||'', armenian: r[1]||'', russian: r[2]||'' }))
               .filter(w => w.armenian && w.russian);
    setStatus('test-status-dot','test-status-text','ok', `${words.length} слов загружено`);
    setStatus('dict-status-dot','dict-status-text','ok', `${words.length} слов`);
    return true;
  } catch(e) {
    setStatus('test-status-dot','test-status-text','err','Ошибка загрузки слов');
    setStatus('dict-status-dot','dict-status-text','err','Ошибка');
    // Demo words if fetch fails
    if (words.length === 0) {
      words = [
        {category:'Урок 1', armenian:'Բարև', russian:'привет'},
        {category:'Урок 1', armenian:'Շնորհակալություն', russian:'спасибо'},
        {category:'Местоимения', armenian:'Ես', russian:'я'},
        {category:'Местоимения', armenian:'Դու', russian:'ты'},
        {category:'Урок 1', armenian:'Հայաստան', russian:'армения'},
      ];
      setStatus('test-status-dot','test-status-text','err', `Офлайн — ${words.length} демо-слов`);
      setStatus('dict-status-dot','dict-status-text','err', 'Демо-данные');
    }
    return false;
  }
}

// ============================================================
// FETCH BLOCKS
// ============================================================
async function fetchBlocks() {
  document.getElementById('blocks-content').innerHTML = '<div style="text-align:center;padding:30px"><div class="spinner"></div></div>';
  try {
    const resp = await fetch(urlBlocks + '&t=' + Date.now());
    const text = await resp.text();
    const rows = parseCSV(text);
    blocks = rows.map(r => ({ letter: r[0]||'', name: r[1]||'', sound: r[2]||'', example: r[3]||'' }))
                 .filter(b => b.letter);
  } catch(e) {
    // Demo alphabet
    blocks = [
      {letter:'Ա',name:'Ayb',sound:'a',example:'ամ'},
      {letter:'Բ',name:'Ben',sound:'b',example:'բան'},
      {letter:'Գ',name:'Gim',sound:'g',example:'գիրք'},
      {letter:'Դ',name:'Da',sound:'d',example:'դուռ'},
      {letter:'Ե',name:'Yech',sound:'ye',example:'երեք'},
      {letter:'Զ',name:'Za',sound:'z',example:'զոր'},
      {letter:'Է',name:'Eh',sound:'e',example:'է'},
      {letter:'Ը',name:'Et',sound:'ə',example:'ըստ'},
      {letter:'Թ',name:'To',sound:'t\'',example:'թութ'},
      {letter:'Ժ',name:'Zhe',sound:'zh',example:'ժամ'},
      {letter:'Ի',name:'Ini',sound:'i',example:'ինչ'},
      {letter:'Լ',name:'Liwn',sound:'l',example:'լույս'},
      {letter:'Խ',name:'Xeh',sound:'kh',example:'խաղ'},
      {letter:'Ծ',name:'Ca',sound:'ts',example:'ծով'},
      {letter:'Կ',name:'Ken',sound:'k',example:'կատու'},
      {letter:'Հ',name:'Ho',sound:'h',example:'հայ'},
      {letter:'Ձ',name:'Ca',sound:'dz',example:'ձև'},
      {letter:'Ղ',name:'Ghad',sound:'gh',example:'ղեկ'},
      {letter:'Ճ',name:'Cheh',sound:'ch',example:'ճամ'},
      {letter:'Մ',name:'Men',sound:'m',example:'մայր'},
      {letter:'Յ',name:'Yi',sound:'y',example:'յոթ'},
      {letter:'Ն',name:'Nu',sound:'n',example:'նա'},
      {letter:'Շ',name:'Sha',sound:'sh',example:'շուն'},
      {letter:'Ո',name:'Vo',sound:'vo/o',example:'ոսկի'},
      {letter:'Չ',name:'Cha',sound:'ch\'',example:'չոր'},
      {letter:'Պ',name:'Peh',sound:'p',example:'պապ'},
      {letter:'Ջ',name:'Jheh',sound:'j',example:'ջուր'},
      {letter:'Ռ',name:'Ra',sound:'r',example:'ռազմ'},
      {letter:'Ս',name:'Seh',sound:'s',example:'սեր'},
      {letter:'Վ',name:'Vev',sound:'v',example:'վարդ'},
      {letter:'Տ',name:'Tiwn',sound:'t',example:'տուն'},
      {letter:'Ր',name:'Reh',sound:'r',example:'ւ'},
      {letter:'Ց',name:'Co',sound:'ts\'',example:'ցանկ'},
      {letter:'Ու',name:'Yiwn',sound:'u',example:'ուզ'},
      {letter:'Փ',name:'Piwr',sound:'p\'',example:'փայտ'},
      {letter:'Ք',name:'Keh',sound:'k\'',example:'քաղ'},
      {letter:'Օ',name:'Oh',sound:'o',example:'օ'},
      {letter:'Ֆ',name:'Feh',sound:'f',example:'ֆուն'},
    ];
  }
  renderBlocks();
}

// ============================================================
// RENDER — TEST
// ============================================================
function renderTest() {
  if (words.length === 0) {
    document.getElementById('test-content').innerHTML = '<p class="test-empty">Слов пока нет.<br>Добавьте слова во вкладке ➕</p>';
    currentWord = null;
    return;
  }
  currentWord = words[Math.floor(Math.random() * words.length)];
  document.getElementById('test-content').innerHTML = `
    <div class="test-armenian">${currentWord.armenian}</div>
    <div class="test-category-badge" style="margin-top:10px">${currentWord.category || '—'}</div>
  `;
  document.getElementById('test-input').value = '';
  document.getElementById('test-feedback').className = 'feedback';
}

function checkAnswer() {
  if (!currentWord) return;
  const input = document.getElementById('test-input').value.trim().toLowerCase();
  const correct = currentWord.russian.trim().toLowerCase();
  const fb = document.getElementById('test-feedback');
  if (!input) return;
  if (input === correct) {
    fb.textContent = '✓ Правильно! «' + currentWord.russian + '»';
    fb.className = 'feedback correct';
    setTimeout(() => { fb.className = 'feedback'; renderTest(); }, 1500);
  } else {
    fb.textContent = '✗ Неверно. Правильно: «' + currentWord.russian + '»';
    fb.className = 'feedback wrong';
  }
}

// ============================================================
// RENDER — DICTIONARY
// ============================================================
function renderDict() {
  const el = document.getElementById('dict-content');
  if (words.length === 0) {
    el.innerHTML = '<div class="dict-empty">Словарь пуст.<br>Добавьте первое слово!</div>';
    return;
  }
  const grouped = {};
  words.forEach(w => {
    const cat = w.category || 'Без категории';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(w);
  });
  el.innerHTML = Object.entries(grouped).map(([cat, ws]) => `
    <div class="dict-category">
      <div class="dict-category-title">${cat}</div>
      ${ws.map(w => `
        <div class="dict-word">
          <div>
            <div class="dict-armenian">${w.armenian}</div>
            <div class="dict-russian">${w.russian}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ============================================================
// RENDER — BLOCKS
// ============================================================
function renderBlocks() {
  const el = document.getElementById('blocks-content');
  if (blocks.length === 0) {
    el.innerHTML = '<div class="dict-empty">Алфавит не загружен.<br>Укажите URL таблицы в Настройках.</div>';
    return;
  }
  el.innerHTML = `<div class="blocks-grid">${blocks.map(b => `
    <div class="block-item">
      <div class="block-letter">${b.letter}</div>
      <div class="block-name">${b.name}</div>
      <div class="block-sound">[${b.sound}]</div>
      ${b.example ? `<div class="block-example">${b.example}</div>` : ''}
    </div>
  `).join('')}</div>`;
}

// ============================================================
// RENDER — SETTINGS & CATEGORIES
// ============================================================
function renderCategories() {
  const el = document.getElementById('categories-display');
  const sel = document.getElementById('add-category');
  const all = allCategories();
  
  el.innerHTML = DEFAULT_CATEGORIES.map(c =>
    `<span class="cat-chip default">${c}</span>`
  ).join('') + userCategories.map((c, i) =>
    `<span class="cat-chip">${c} <span class="cat-remove" data-i="${i}">×</span></span>`
  ).join('');

  sel.innerHTML = all.map(c => `<option value="${c}">${c}</option>`).join('');

  el.querySelectorAll('.cat-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      userCategories.splice(+btn.dataset.i, 1);
      localStorage.setItem('arm_categories', JSON.stringify(userCategories));
      renderCategories();
    });
  });
}

function renderURLSettings() {
  document.getElementById('url-words').value = urlWords;
  document.getElementById('url-blocks').value = urlBlocks;
  document.getElementById('url-script').value = urlScript;
}

// ============================================================
// ADD WORD
// ============================================================
async function saveWord() {
  const word = document.getElementById('add-word').value.trim();
  const article = document.getElementById('add-article').value.trim();
  const translation = document.getElementById('add-translation').value.trim();
  const category = document.getElementById('add-category').value;
  if (!word || !translation) { showToast('⚠️ Заполните слово и перевод'); return; }

  const label = document.getElementById('save-label');
  label.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;border-top-color:#fff;border-color:rgba(255,255,255,0.3)"></div>';
  
  try {
    await fetch(urlScript, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category, word: word + (article ? ' (' + article + ')' : ''), translation })
    });
    showToast('✓ Слово добавлено!');
    document.getElementById('add-word').value = '';
    document.getElementById('add-article').value = '';
    document.getElementById('add-translation').value = '';
  } catch(e) {
    showToast('✗ Ошибка отправки');
  }
  label.textContent = 'Сохранить слово';
}

// ============================================================
// TABS
// ============================================================
const tabActions = {
  test: async () => { await fetchWords(); renderTest(); },
  add: () => renderCategories(),
  dict: async () => { await fetchWords(); renderDict(); },
  blocks: () => fetchBlocks(),
  settings: () => { renderCategories(); renderURLSettings(); }
};

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', async () => {
    const id = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + (id === 'add' ? 'add' : id)).classList.add('active');
    if (tabActions[id]) await tabActions[id]();
  });
});

// ============================================================
// BUTTON LISTENERS
// ============================================================
document.getElementById('btn-check').addEventListener('click', checkAnswer);
document.getElementById('test-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
document.getElementById('btn-skip').addEventListener('click', () => { document.getElementById('test-feedback').className = 'feedback'; renderTest(); });
document.getElementById('btn-save').addEventListener('click', saveWord);

document.getElementById('btn-add-category').addEventListener('click', () => {
  const val = document.getElementById('new-category-input').value.trim();
  if (!val) return;
  if (allCategories().includes(val)) { showToast('Категория уже есть'); return; }
  userCategories.push(val);
  localStorage.setItem('arm_categories', JSON.stringify(userCategories));
  document.getElementById('new-category-input').value = '';
  renderCategories();
  showToast('✓ Категория добавлена');
});

document.getElementById('btn-save-urls').addEventListener('click', () => {
  urlWords  = document.getElementById('url-words').value.trim() || DEFAULT_URL_WORDS_READ;
  urlBlocks = document.getElementById('url-blocks').value.trim() || DEFAULT_URL_BLOCKS;
  urlScript = document.getElementById('url-script').value.trim() || DEFAULT_URL_APPS_SCRIPT;
  localStorage.setItem('arm_url_words', urlWords);
  localStorage.setItem('arm_url_blocks', urlBlocks);
  localStorage.setItem('arm_url_script', urlScript);
  showToast('✓ URLs сохранены');
});

// ============================================================
// INIT
// ============================================================
(async () => {
  renderCategories();
  await fetchWords();
  renderTest();
  fetchBlocks();
})();
</script>
</body>
</html>
