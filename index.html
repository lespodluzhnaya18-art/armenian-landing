<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇦🇲 Армянский Язык</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
        --red: #E8341C;
        --red-soft: #fff1ee;
        --dark: #1a1a1a;
        --mid: #555;
        --light: #888;
        --border: #e8e8e8;
        --bg: #f7f5f2;
        --card: #ffffff;
        --radius: 30px;
        --radius-sm: 18px;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 16px 80px;
    }

    /* === HEADER === */
    .hero {
        text-align: center;
        padding: 50px 0 35px;
        max-width: 500px;
        width: 100%;
    }
    .hero h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(34px, 8vw, 44px);
        letter-spacing: -1px;
        color: var(--dark);
        margin: 0;
        line-height: 1.1;
    }
    .hero h1 span { color: var(--red); }
    .hero p {
        margin-top: 10px;
        font-size: 15px;
        color: var(--light);
        font-weight: 300;
        letter-spacing: 0.5px;
    }

    /* === CARD === */
    .card {
        background: var(--card);
        border-radius: var(--radius);
        width: 100%;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.06);
        overflow: hidden;
        position: relative;
    }

    /* === TABS (Улучшенная читабельность) === */
    .tabs {
        display: flex;
        background: #fafafa;
        border-bottom: 1px solid var(--border);
        padding: 0 5px;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
        flex: 1;
        min-width: 80px;
        padding: 22px 2px;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
        cursor: pointer;
        color: var(--light);
        transition: 0.3s;
        border-bottom: 3px solid transparent;
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }
    .tab-icon { font-size: 22px; display: block; margin-bottom: 6px; }
    .tab.active { color: var(--red); border-bottom-color: var(--red); background: #fff; }

    /* === PANELS === */
    .panel { display: none; padding: 35px 30px; }
    .panel.active { display: block; }

    /* === ТЕСТЫ === */
    .test-mode-toggle { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
    .mode-btn { font-size: 11px; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--light); font-weight: 600; text-transform: uppercase; }
    .mode-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

    .test-box {
        background: linear-gradient(135deg, #fff5f4 0%, #fff 100%);
        border: 1.5px solid #ffd5d0;
        border-radius: var(--radius-sm);
        padding: 60px 20px;
        text-align: center;
        margin-bottom: 25px;
        min-height: 180px;
        display: flex; align-items: center; justify-content: center;
    }
    .test-armenian { font-family: 'Playfair Display', serif; font-size: 56px; color: var(--dark); }
    
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--light); margin-bottom: 8px; text-transform: uppercase; }
    input, select { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; outline: none; transition: 0.2s; }
    input:focus { border-color: var(--red); box-shadow: 0 0 0 5px rgba(232,52,28,0.06); }

    .btn { width: 100%; padding: 18px; border-radius: var(--radius-sm); border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 16px; }
    .btn-primary { background: var(--red); color: #fff; }

    /* === БИБЛИОТЕКА === */
    .library-nav { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .library-nav::-webkit-scrollbar { display: none; }
    .lib-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; color: var(--mid); }
    .lib-btn.active { background: var(--dark); color: #fff; }

    /* === SETTINGS (Floating) === */
    .floating-settings {
        position: fixed; bottom: 25px; left: 25px; width: 45px; height: 45px;
        background: rgba(255,255,255,0.7); border: 1px solid var(--border); border-radius: 50%;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        font-size: 20px; color: var(--light); z-index: 1000; transition: 0.3s; backdrop-filter: blur(8px); opacity: 0.6;
    }
    .floating-settings:hover { transform: rotate(45deg); color: var(--red); opacity: 1; }

    /* === GRID & LISTS === */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
    .grid-item { background: #fff; border: 1px solid var(--border); padding: 25px 10px; border-radius: var(--radius-sm); text-align: center; }
    .grid-letter { font-family: 'Playfair Display', serif; font-size: 34px; color: var(--red); }
    .dict-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
    .cat-title { font-size: 11px; font-weight: 800; color: var(--red); margin-top: 25px; text-transform: uppercase; border-bottom: 1px solid var(--red-soft); }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 15px 35px; border-radius: 40px; font-size: 14px; display: none; z-index: 2000; }
</style>
</head>
<body>

<div class="hero">
    <h1>Армянский <span>Язык</span></h1>
    <p>Твой интерактивный помощник в изучении языка</p>
</div>

<div class="card">
    <div class="tabs">
        <div class="tab active" data-tab="test"><span class="tab-icon">🎯</span>Тесты</div>
        <div class="tab" data-tab="add"><span class="tab-icon">➕</span>Слово</div>
        <div class="tab" data-tab="words"><span class="tab-icon">📚</span>Слова</div>
        <div class="tab" data-tab="alphabet"><span class="tab-icon">📖</span>Алфавит</div>
        <div class="tab" data-tab="library"><span class="tab-icon">🏛️</span>Библиотека</div>
    </div>

    <div class="panel active" id="panel-test">
        <div class="test-mode-toggle">
            <button class="mode-btn active" id="mode-rus" onclick="setMode('translation')">Перевод</button>
            <button class="mode-btn" id="mode-arm" onclick="setMode('pronunciation')">Звук</button>
        </div>
        <div class="test-box"><div id="test-word" class="test-armenian">Загрузка...</div></div>
        <input type="text" id="answer-input" placeholder="Введите ответ..." autocomplete="off">
        <button class="btn btn-primary" style="margin-top:20px" onclick="checkAnswer()">Проверить ✓</button>
    </div>

    <div class="panel" id="panel-add">
        <div class="input-group"><label>Армянское слово</label><input type="text" id="add-arm"></div>
        <div class="input-group"><label>Транскрипция</label><input type="text" id="add-trans"></div>
        <div class="input-group"><label>Русский перевод</label><input type="text" id="add-rus"></div>
        <div class="input-group"><label>Список (Категория)</label><select id="add-cat"></select></div>
        <button class="btn btn-primary" onclick="saveWord()">Сохранить в Google</button>
    </div>

    <div class="panel" id="panel-words"><div id="words-content">Слова загружаются...</div></div>

    <div class="panel" id="panel-alphabet"><div class="grid" id="alphabet-grid"></div></div>

    <div class="panel" id="panel-library">
        <div class="library-nav">
            <button class="lib-btn active" onclick="loadLibrarySection('Префиксы', this)">Префиксы</button>
            <button class="lib-btn" onclick="loadLibrarySection('Суффиксы', this)">Суффиксы</button>
        </div>
        <div id="library-content">Выберите раздел</div>
    </div>

    <div class="panel" id="panel-settings">
        <div class="input-group"><label>Script URL (Ключ доступа)</label><input type="text" id="url-input"></div>
        <button class="btn btn-primary" onclick="saveSettings()">Сохранить настройки</button>
        <div class="input-group" style="margin-top:35px;">
            <label>Создать категорию слов</label>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="text" id="new-cat-input" style="flex:1" placeholder="Название...">
                <button onclick="addCategory()" style="width:46px; height:46px; background:var(--red); border:none; color:#fff; border-radius:50%; font-size:24px; cursor:pointer;">+</button>
            </div>
        </div>
    </div>
</div>

<div class="floating-settings" title="Настройки" onclick="openSettingsTab()">⚙️</div>
<div class="toast" id="toast"></div>

<script>
// --- УМНЫЙ ПОИСК ДАННЫХ ---
function getVal(obj, keys) {
    const foundKey = Object.keys(obj).find(k => keys.includes(k.trim().toLowerCase()));
    return foundKey ? obj[foundKey] : "—";
}

let SCRIPT_URL = localStorage.getItem('arm_exec_url') || 'ВСТАВЬ_СЮДА_СВОЙ_EXEC_URL';
let categories = JSON.parse(localStorage.getItem('arm_cats')) || ['Урок 1', 'Семья'];
let wordsData = [];
let testMode = 'translation';
let currentWord = null;

async function init() {
    document.getElementById('url-input').value = SCRIPT_URL;
    renderCategories();
    if(SCRIPT_URL.includes('exec')) {
        await syncData('Слова');
        renderTest();
    } else {
        document.getElementById('test-word').innerText = "Настрой URL ⚙️";
    }
}

async function syncData(sheet) {
    try {
        const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
        const data = await res.json();
        if (sheet === 'Слова') wordsData = data;
        return data;
    } catch(e) { return []; }
}

function renderTest() {
    if(!wordsData.length) return document.getElementById('test-word').innerText = 'Нет слов';
    currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
    document.getElementById('test-word').innerText = getVal(currentWord, ['армянский', 'слово', 'armenian']);
    document.getElementById('answer-input').value = '';
}

function setMode(mode) {
    testMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(mode === 'translation' ? 'mode-rus' : 'mode-arm').classList.add('active');
    renderTest();
}

function checkAnswer() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = (testMode === 'translation' ? getVal(currentWord, ['русский', 'перевод', 'russian']) : getVal(currentWord, ['транскрипция', 'звук', 'transcription'])).toLowerCase();
    if(input === correct) { showToast('✨ Правильно!'); setTimeout(renderTest, 1200); }
    else { showToast(`❌ Ожидалось: ${correct}`); }
}

async function saveWord() {
    const data = {
        targetSheet: 'Слова',
        category: document.getElementById('add-cat').value,
        word: document.getElementById('add-arm').value.trim(),
        transcription: document.getElementById('add-trans').value.trim(),
        translation: document.getElementById('add-rus').value.trim()
    };
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    showToast('✓ Сохранено!');
    syncData('Слова');
}

async function renderAlphabet() {
    const grid = document.getElementById('alphabet-grid');
    grid.innerHTML = 'Загрузка...';
    const data = await syncData('Алфавит');
    grid.innerHTML = data.map(b => `
        <div class="grid-item">
            <div class="grid-letter">${getVal(b, ['буква', 'letter'])}</div>
            <div style="font-size:11px; color:var(--light)">${getVal(b, ['название', 'name'])} [${getVal(b, ['звук', 'транскрипция', 'sound'])}]</div>
        </div>
    `).join('');
}

async function loadLibrarySection(name, btn) {
    document.querySelectorAll('.lib-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cont = document.getElementById('library-content');
    cont.innerHTML = 'Загрузка...';
    const data = await syncData(name);
    cont.innerHTML = data.map(item => `
        <div class="dict-item">
            <b style="font-family:'Playfair Display',serif; font-size:19px">${getVal(item, ['префикс', 'часть', 'слово'])}</b>
            <span style="font-size:14px; color:var(--mid); text-align:right;">${getVal(item, ['значение', 'перевод'])}</span>
        </div>
    `).join('');
}

function renderWords() {
    const cont = document.getElementById('words-content');
    const grouped = {};
    wordsData.forEach(w => { 
        const cat = getVal(w, ['категория', 'category']);
        if(!grouped[cat]) grouped[cat] = []; 
        grouped[cat].push(w); 
    });
    cont.innerHTML = Object.entries(grouped).map(([cat, ws]) => `
        <div class="cat-title">${cat}</div>
        ${ws.map(w => `<div class="dict-item"><b>${getVal(w, ['армянский', 'слово'])}</b> <span>${getVal(w, ['русский', 'перевод'])}</span></div>`).join('')}
    `).join('');
}

function openSettingsTab() {
    document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
    document.getElementById('panel-settings').classList.add('active');
}

function renderCategories() { document.getElementById('add-cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join(''); }
function addCategory() {
    const val = document.getElementById('new-cat-input').value.trim();
    if(val) { categories.push(val); localStorage.setItem('arm_cats', JSON.stringify(categories)); renderCategories(); document.getElementById('new-cat-input').value = ''; showToast('Категория добавлена'); }
}
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
function saveSettings() { localStorage.setItem('arm_exec_url', document.getElementById('url-input').value.trim()); location.reload(); }

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', async () => {
        const tab = t.dataset.tab;
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        t.classList.add('active'); document.getElementById('panel-' + tab).classList.add('active');
        if(tab === 'alphabet') renderAlphabet();
        if(tab === 'words') renderWords();
        if(tab === 'library') loadLibrarySection('Префиксы', document.querySelector('.lib-btn'));
    });
});

init();
</script>
</body>
</html>
