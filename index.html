<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇦🇲 Армянский Язык | Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
        --red: #E8341C; --red-soft: #fff1ee; --dark: #1a1a1a; --mid: #555;
        --light: #888; --border: #e8e8e8; --bg: #f7f5f2; --card: #ffffff;
        --radius: 32px; --radius-sm: 18px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 12px 100px; }

    /* AUTH SCREEN */
    #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: #fff; padding: 40px 25px; border-radius: var(--radius); width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); text-align: center; }
    .auth-card h2 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 10px; }

    /* MAIN APP UI */
    #main-app { display: none; width: 100%; max-width: 500px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hero { text-align: center; padding: 45px 0 30px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 44px; line-height: 1.1; margin-bottom: 8px; }
    .hero h1 span { color: var(--red); }
    .hero p { font-size: 15px; color: var(--light); font-weight: 300; }

    .card { background: var(--card); border-radius: var(--radius); box-shadow: 0 15px 45px rgba(0,0,0,0.05); overflow: hidden; position: relative; }
    .tabs { display: flex; background: #fafafa; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
    .tab { flex: 1; min-width: 85px; padding: 22px 5px; font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; color: var(--light); border-bottom: 3px solid transparent; text-transform: uppercase; letter-spacing: 0.8px; }
    .tab.active { color: var(--red); border-bottom-color: var(--red); background: #fff; }

    .panel { display: none; padding: 35px 25px; }
    .panel.active { display: block; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--light); margin-bottom: 6px; text-transform: uppercase; }
    input, select { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; outline: none; background: #fff; }
    
    .btn { width: 100%; padding: 18px; border-radius: var(--radius-sm); border: none; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--mid); margin-top: 10px; }

    .floating-settings { 
        position: fixed; bottom: 25px; left: 25px; width: 50px; height: 50px; 
        background: rgba(255,255,255,0.9); border: 1px solid var(--border); 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
        z-index: 1000; backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .floating-settings:hover { transform: rotate(90deg); }

    .dict-item { padding: 16px 0; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 15px 35px; border-radius: 40px; font-size: 14px; display: none; z-index: 10000; text-align: center; width: 90%; max-width: 400px; }
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2>Барев, Джан! 🇦🇲</h2>
        <p style="font-size:14px; color:#888; margin-bottom:25px;">Введите свои данные</p>
        <div class="input-group"><label>Логин</label><input type="text" id="auth-login"></div>
        <div class="input-group"><label>Пароль</label><input type="password" id="auth-pass"></div>
        <button id="login-btn" class="btn btn-primary" onclick="handleLogin()">Войти в систему</button>
    </div>
</div>

<div id="main-app">
    <div class="hero">
        <h1>Армянский <span>Язык</span></h1>
        <p>Твой интерактивный помощник в изучении языка</p>
    </div>
    <div class="card">
        <div class="tabs">
            <div class="tab active" data-tab="test">🎯 Тесты</div>
            <div class="tab" data-tab="add">➕ Слова</div>
            <div class="tab" data-tab="words">📚 Словарь</div>
            <div class="tab" data-tab="alphabet">📖 Алфавит</div>
            <div class="tab" data-tab="library">🏛️ Библиотека</div>
        </div>

        <div class="panel active" id="panel-test">
            <div id="test-word" style="font-family:'Playfair Display', serif; font-size:52px; text-align:center; margin:40px 0;">...</div>
            <input type="text" id="answer-input" placeholder="Введите перевод..." autocomplete="off">
            <button class="btn btn-primary" style="margin-top:20px" onclick="checkAnswer()">Проверить ✓</button>
        </div>

        <div class="panel" id="panel-add">
            <div class="input-group"><label>Слово</label><input type="text" id="add-arm" placeholder="Напр: Բարև"></div>
            <div class="input-group"><label>Транскрипция</label><input type="text" id="add-trans" placeholder="Напр: Barev"></div>
            <div class="input-group"><label>Перевод</label><input type="text" id="add-rus" placeholder="Напр: Привет"></div>
            <div class="input-group"><label>Категория</label><select id="add-cat"><option value="Урок 1">Урок 1</option><option value="Семья">Семья</option></select></div>
            <button class="btn btn-primary" id="save-btn" onclick="saveWord()">Добавить в словарь</button>
        </div>

        <div class="panel" id="panel-words"><div id="words-content">Загрузка...</div></div>
        <div class="panel" id="panel-alphabet"><div id="alphabet-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap:12px;"></div></div>
        <div class="panel" id="panel-library">Раздел в разработке</div>

        <div class="panel" id="panel-settings">
            <div id="admin-badge-box"></div>
            <p id="user-info" style="font-size:13px; color:var(--light); margin-bottom:20px;"></p>
            <div id="admin-panel" style="display:none; border-top:1px dashed var(--red); padding-top:20px;">
                <h3 style="font-size:14px; margin-bottom:15px; color:var(--red)">Панель Админа</h3>
                <div class="input-group"><label>Логин юзера</label><input type="text" id="new-login"></div>
                <div class="input-group"><label>Пароль</label><input type="text" id="new-pass"></div>
                <div class="input-group"><label>Ссылка на таблицу</label><input type="text" id="new-tid"></div>
                <button class="btn btn-primary" onclick="adminAddUser()">Создать аккаунт</button>
            </div>
            <button class="btn btn-outline" style="margin-top:40px; color:var(--red)" onclick="logout()">Выйти</button>
        </div>
    </div>
</div>

<div class="floating-settings" onclick="openSettings()">⚙️</div>
<div id="toast" class="toast"></div>

<script>

// !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
// !!! ВОТ СЮДА ВСТАВЛЯЙ СВОЮ ССЫЛКУ МЕЖДУ КАВЫЧКАМИ ВНИЗУ (строка 214) !!!
// !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

const MASTER_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyYIdUltSziWHs0_G3SGbDR9zpF06YEYdDCePNQB9KKiqvgbwYY8Tioi9Lg2Rf-Oo/exec"; 

// !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
// !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

let currentUser = JSON.parse(localStorage.getItem('arm_session')) || null;
let wordsData = [];
let currentWord = null;

async function checkSession() { if (currentUser) showApp(); }

async function handleLogin() {
    const login = document.getElementById('auth-login').value.trim();
    const pass = document.getElementById('auth-pass').value.trim();
    if(!login || !pass) return showToast('Заполните поля');
    try {
        const res = await fetch(`${MASTER_SCRIPT_URL}?action=login&login=${encodeURIComponent(login)}&pass=${encodeURIComponent(pass)}`);
        const result = await res.json();
        if(result.success) {
            currentUser = { login, tableId: result.tableId, role: result.role };
            localStorage.setItem('arm_session', JSON.stringify(currentUser));
            location.reload();
        } else { showToast(result.message); }
    } catch(e) { showToast('Ошибка соединения'); }
}

function showApp() {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('user-info').innerText = `Профиль: ${currentUser.login}`;
    if(currentUser.role === 'admin') document.getElementById('admin-panel').style.display = 'block';
    syncData('Слова').then(() => renderTest());
}

async function syncData(sheet) {
    try {
        const res = await fetch(`${MASTER_SCRIPT_URL}?action=fetch&tableId=${encodeURIComponent(currentUser.tableId)}&sheet=${encodeURIComponent(sheet)}`);
        const data = await res.json();
        if (data.error) { showToast('⚠️ ' + data.error); return []; }
        if(sheet === 'Слова') wordsData = data;
        return data;
    } catch(e) { return []; }
}

async function saveWord() {
    const data = { action: "addWord", tableId: currentUser.tableId, category: document.getElementById('add-cat').value, word: document.getElementById('add-arm').value, transcription: document.getElementById('add-trans').value, translation: document.getElementById('add-rus').value };
    await fetch(MASTER_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
    showToast('✓ Добавлено');
    syncData('Слова');
}

function renderTest() {
    if(!wordsData.length) return;
    currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
    document.getElementById('test-word').innerText = currentWord.Армянский || currentWord.Слово || "—";
    document.getElementById('answer-input').value = '';
}

function checkAnswer() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = (currentWord.Русский || currentWord.Перевод || "").toLowerCase();
    if(input === correct) { showToast('✨ Джан!'); setTimeout(renderTest, 1200); }
    else { showToast(`❌ Правильно: ${correct}`); }
}

function logout() { localStorage.removeItem('arm_session'); location.reload(); }
function openSettings() { document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active')); document.getElementById('panel-settings').classList.add('active'); }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3500); }

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
        const tab = t.dataset.tab;
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        t.classList.add('active'); document.getElementById('panel-' + tab).classList.add('active');
        if(tab === 'alphabet') syncData('Алфавит').then(data => {
            document.getElementById('alphabet-grid').innerHTML = data.map(b => `<div class="grid-item"><div style="font-size:28px; color:var(--red); font-family:'Playfair Display';">${b.Буква || ''}</div><div style="font-size:10px; color:#888;">${b.Название || ''}</div></div>`).join('');
        });
        if(tab === 'words') syncData('Слова').then(data => {
            const cont = document.getElementById('words-content');
            cont.innerHTML = data.map(w => `<div class="dict-item"><div><b>${w.Армянский || w.Слово}</b><br><small style="color:#888">${w.Транскрипция || ''}</small></div> <span>${w.Русский || w.Перевод}</span></div>`).join('');
        });
    });
});

checkSession();
</script>
</body>
</html>
