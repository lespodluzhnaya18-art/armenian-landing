<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇦🇲 Армянский язык</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --red: #E8341C; --red-soft: #fff1ee; --dark: #1a1a1a; --mid: #555;
        --light: #888; --border: #e8e8e8; --bg: #f7f5f2; --card: #ffffff;
        --radius: 24px; --radius-sm: 14px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px 16px 60px; }
    .hero { text-align: center; padding: 30px 0 20px; max-width: 450px; width: 100%; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 34px; color: var(--dark); }
    .hero h1 span { color: var(--red); }
    .card { background: var(--card); border-radius: var(--radius); width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); overflow: hidden; }
    .tabs { display: flex; background: #fafafa; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: 1; min-width: 70px; padding: 14px 2px; font-size: 10px; font-weight: 600; text-align: center; cursor: pointer; color: var(--light); border-bottom: 2px solid transparent; text-transform: uppercase; }
    .tab.active { color: var(--red); border-bottom-color: var(--red); background: #fff; }
    .panel { display: none; padding: 25px; }
    .panel.active { display: block; }
    .test-box { background: var(--red-soft); border: 1px dashed var(--red); border-radius: var(--radius-sm); padding: 40px 20px; text-align: center; margin-bottom: 20px; }
    .test-armenian { font-family: 'Playfair Display', serif; font-size: 46px; }
    .test-mode { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
    .mode-btn { font-size: 10px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--light); font-weight: 600; }
    .mode-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; font-size: 10px; font-weight: 700; color: var(--light); margin-bottom: 4px; text-transform: uppercase; }
    input, select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; outline: none; }
    .btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn-primary { background: var(--red); color: #fff; }
    .dict-item { padding: 12px 0; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
    .grid-item { background: #fff; border: 1px solid var(--border); padding: 10px; border-radius: var(--radius-sm); text-align: center; }
    .grid-letter { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--red); }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; display: none; z-index: 100; }
</style>
</head>
<body>

<div class="hero">
    <h1>Армянский <span>Язык</span></h1>
    <p>Системный прогресс по Дарию Степаняну</p>
</div>

<div class="card">
    <div class="tabs">
        <div class="tab active" data-tab="test">🎯 Тесты</div>
        <div class="tab" data-tab="add">➕ Слово</div>
        <div class="tab" data-tab="words">📚 Слова</div>
        <div class="tab" data-tab="alphabet">📖 Блоки</div>
        <div class="tab" data-tab="prefixes">🔗 Префиксы</div>
        <div class="tab" data-tab="settings">⚙️</div>
    </div>

    <div class="panel active" id="panel-test">
        <div class="test-mode">
            <button class="mode-btn active" id="mode-rus" onclick="setMode('translation')">Перевод</button>
            <button class="mode-btn" id="mode-arm" onclick="setMode('pronunciation')">Звук</button>
        </div>
        <div class="test-box"><div id="test-word" class="test-armenian">...</div></div>
        <input type="text" id="answer-input" placeholder="Ответ..." style="margin-bottom:10px;">
        <button class="btn btn-primary" onclick="checkAnswer()">Проверить ✓</button>
    </div>

    <div class="panel" id="panel-add">
        <div class="input-group"><label>Армянский</label><input type="text" id="add-arm"></div>
        <div class="input-group"><label>Транскрипция</label><input type="text" id="add-trans"></div>
        <div class="input-group"><label>Русский</label><input type="text" id="add-rus"></div>
        <div class="input-group"><label>Список</label><select id="add-cat"></select></div>
        <button class="btn btn-primary" id="save-btn" onclick="saveWord()">Сохранить</button>
    </div>

    <div class="panel" id="panel-words"><div id="words-content">Загрузка...</div></div>

    <div class="panel" id="panel-alphabet"><div class="grid" id="alphabet-grid"></div></div>

    <div class="panel" id="panel-prefixes"><div id="prefixes-content">Загрузка...</div></div>

    <div class="panel" id="panel-settings">
        <div class="input-group"><label>Script URL (Ключ доступа)</label><input type="text" id="url-input"></div>
        <button class="btn btn-primary" onclick="saveSettings()">Применить ключ</button>
        <div class="input-group" style="margin-top:20px;">
            <label>Создать категорию</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-cat-input" style="flex:1;">
                <button onclick="addCategory()" style="width:50px;">+</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let SCRIPT_URL = localStorage.getItem('arm_exec_url') || 'ВСТАВЬ_СВОЙ_EXEC_URL';
let categories = JSON.parse(localStorage.getItem('arm_cats')) || ['Урок 1', 'Семья'];
let wordsData = [];
let testMode = 'translation';
let currentWord = null;

async function init() {
    document.getElementById('url-input').value = SCRIPT_URL;
    renderCategories();
    await syncData('Слова');
    renderTest();
}

async function syncData(sheet) {
    try {
        const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheet)}`);
        const data = await res.json();
        if (sheet === 'Слова') wordsData = data;
        return data;
    } catch(e) { console.error('Ошибка:', sheet); return []; }
}

function setMode(mode) {
    testMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(mode === 'translation' ? 'mode-rus' : 'mode-arm').classList.add('active');
    renderTest();
}

function renderTest() {
    if(!wordsData.length) return document.getElementById('test-word').innerText = 'Нет слов';
    currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
    document.getElementById('test-word').innerText = currentWord.Армянский;
    document.getElementById('answer-input').value = '';
}

function checkAnswer() {
    const input = document.getElementById('answer-input').value.trim().toLowerCase();
    const correct = (testMode === 'translation' ? currentWord.Русский : currentWord.Транскрипция).toLowerCase();
    if(input === correct) { showToast('✨ Верно!'); setTimeout(renderTest, 1200); }
    else { showToast(`❌ Ошибка: ${correct}`); }
}

async function saveWord() {
    const data = {
        targetSheet: 'Слова',
        category: document.getElementById('add-cat').value,
        word: document.getElementById('add-arm').value.trim(),
        transcription: document.getElementById('add-trans').value.trim(),
        translation: document.getElementById('add-rus').value.trim()
    };
    const btn = document.getElementById('save-btn');
    btn.innerText = 'Сохранение...';
    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
    showToast('✓ Сохранено в Google!');
    btn.innerText = 'Сохранить';
    await syncData('Слова');
}

async function renderBlocks() {
    const data = await syncData('Алфавит');
    const grid = document.getElementById('alphabet-grid');
    grid.innerHTML = data.map(b => `<div class="grid-item"><div class="grid-letter">${b.Буква}</div><div style="font-size:10px;">${b.Название} [${b.Звук}]</div></div>`).join('');
}

async function renderPrefixes() {
    const data = await syncData('Префиксы');
    const cont = document.getElementById('prefixes-content');
    cont.innerHTML = data.map(p => `<div class="dict-item"><b>${p.Префикс}</b> <span>${p.Значение}</span></div>`).join('');
}

function renderWords() {
    const cont = document.getElementById('words-content');
    const grouped = {};
    wordsData.forEach(w => { if(!grouped[w.Категория]) grouped[w.Категория] = []; grouped[w.Категория].push(w); });
    cont.innerHTML = Object.entries(grouped).map(([cat, ws]) => `
        <div style="color:var(--red); font-size:10px; font-weight:800; margin:15px 0 5px; border-bottom:1px solid var(--red-soft); text-transform:uppercase;">${cat}</div>
        ${ws.map(w => `<div class="dict-item"><b>${w.Армянский}</b> <span>${w.Русский}</span></div>`).join('')}
    `).join('');
}

function renderCategories() {
    document.getElementById('add-cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
}

function addCategory() {
    const val = document.getElementById('new-cat-input').value.trim();
    if(val && !categories.includes(val)) { categories.push(val); localStorage.setItem('arm_cats', JSON.stringify(categories)); renderCategories(); document.getElementById('new-cat-input').value = ''; showToast('Категория добавлена'); }
}

function showToast(msg) {
    const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}

function saveSettings() {
    localStorage.setItem('arm_exec_url', document.getElementById('url-input').value.trim());
    location.reload();
}

document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', async () => {
        const tab = t.dataset.tab;
        document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
        t.classList.add('active'); document.getElementById('panel-' + tab).classList.add('active');
        if(tab === 'alphabet') renderBlocks();
        if(tab === 'words') renderWords();
        if(tab === 'prefixes') renderPrefixes();
    });
});

init();
</script>
</body>
</html>
