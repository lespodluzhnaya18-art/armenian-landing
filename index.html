<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armenian Way | Твой тренажер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; color: #333; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hero { text-align: center; padding: 60px 20px; max-width: 600px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #1a1a1a; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #FF4B4B; color: white; font-weight: 500; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #e64444; transform: translateY(-2px); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { cursor: pointer; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; background: #eee; }
        .tab.active { background: #1a1a1a; color: white; }
        #word-display { font-size: 1.8rem; font-weight: 700; margin: 20px 0; color: #FF4B4B; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>🇦🇲 Armenian Way</h1>
        <p>Изучение армянского языка по системе Дария Степаняна. Твой личный прогресс в одном месте.</p>
    </div>

    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('test')">Тест</div>
            <div class="tab" onclick="showTab('add')">Добавить</div>
            <div class="tab" onclick="showTab('list')">Словарь</div>
        </div>

        <div id="test-section">
            <div id="word-display">Загрузи слова!</div>
            <input type="text" id="answer-input" placeholder="Перевод на русский...">
            <button onclick="checkAnswer()">Проверить</button>
            <p id="feedback"></p>
        </div>

        <div id="add-section" style="display:none;">
            <h3>Новое слово</h3>
            <input type="text" id="new-arm" placeholder="Армянское (напр: Tun)">
            <input type="text" id="new-art" placeholder="Артикль (напр: -ը)">
            <input type="text" id="new-rus" placeholder="Перевод">
            <button onclick="saveWord()">Сохранить</button>
        </div>

        <div id="list-section" style="display:none;">
            <h3>Мои знания</h3>
            <div id="words-list"></div>
        </div>
    </div>

    <script>
        let dictionary = JSON.parse(localStorage.getItem('arm_words')) || {};
        let currentWord = "";

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('test-section').style.display = tab === 'test' ? 'block' : 'none';
            document.getElementById('add-section').style.display = tab === 'add' ? 'block' : 'none';
            document.getElementById('list-section').style.display = tab === 'list' ? 'block' : 'none';
            if(tab === 'list') updateList();
            if(tab === 'test') nextWord();
        }

        function saveWord() {
            const arm = document.getElementById('new-arm').value;
            const art = document.getElementById('new-art').value;
            const rus = document.getElementById('new-rus').value;
            if(arm && rus) {
                dictionary[arm + art] = rus;
                localStorage.setItem('arm_words', JSON.stringify(dictionary));
                alert('Слово сохранено!');
                document.getElementById('new-arm').value = '';
                document.getElementById('new-rus').value = '';
            }
        }

        function nextWord() {
            const keys = Object.keys(dictionary);
            if(keys.length > 0) {
                currentWord = keys[Math.floor(Math.random() * keys.length)];
                document.getElementById('word-display').innerText = currentWord;
                document.getElementById('feedback').innerText = "";
                document.getElementById('answer-input').value = "";
            }
        }

        function checkAnswer() {
            const ans = document.getElementById('answer-input').value.toLowerCase().trim();
            if(ans === dictionary[currentWord].toLowerCase().trim()) {
                document.getElementById('feedback').innerHTML = "✨ Правильно, Джан!";
                setTimeout(nextWord, 1500);
            } else {
                document.getElementById('feedback').innerHTML = "❌ Ошибка. Это '" + dictionary[currentWord] + "'";
            }
        }

        function updateList() {
            const list = document.getElementById('words-list');
            list.innerHTML = "";
            for(let key in dictionary) {
                list.innerHTML += `<div class="list-item"><b>${key}</b> <span>${dictionary[key]}</span></div>`;
            }
        }

        nextWord();
    </script>
</body>
</html>
